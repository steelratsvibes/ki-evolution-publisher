name: Daily Instagram Publish

on:
  schedule:
    # 07:00 UTC = 08:00 CET (winter) / 08:00 CEST nach DST-Switch
    - cron: '0 6 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Check queue
        id: check
        run: |
          if [ -z "$(ls queue/*/meta.json 2>/dev/null)" ]; then
            echo "empty=true" >> $GITHUB_OUTPUT
            echo "Queue is empty — nothing to publish"
          else
            echo "empty=false" >> $GITHUB_OUTPUT
            echo "Found staged posts:"
            ls queue/*/meta.json
          fi

      - name: Publish
        if: steps.check.outputs.empty == 'false'
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: python publish.py

      - name: Commit results
        if: steps.check.outputs.empty == 'false'
        run: |
          git config user.name "KI Evolution Publisher"
          git config user.email "publisher@ki-evolution.bot"
          git add queue/ done/
          git diff --staged --quiet || git commit -m "Published $(date +%Y-%m-%d)"
          git push
